name: Bug Report
description: Report a bug in Opservant Spark
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `./spark playbook ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and Architecture
      placeholder: "e.g. Ubuntu 22.04 / amd64"
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go Version
      placeholder: "e.g. go1.26.2"
    validations:
      required: false

  - type: input
    id: spark_version
    attributes:
      label: Spark Version
      placeholder: "e.g. v0.1.0 or commit hash"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output.
      render: shell
    validations:
      required: false
